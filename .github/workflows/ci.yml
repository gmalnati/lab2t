name: CI

# Step 1 of the lab: checkout, build, and test on every push and PR.
# NOTE: caching is intentionally left OUT here so that Step 4 has something
# to add. You will compare run times before/after enabling the Gradle cache.

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build and test
        run: ./gradlew build --no-daemon
